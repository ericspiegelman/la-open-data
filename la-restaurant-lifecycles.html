const MIN_YEAR = 1920;
const MAX_YEAR = 2026;
const RANGE = MAX_YEAR - MIN_YEAR;

let currentFilter = 'all';
let currentSort = 'opened';

function yearToPercent(y) {
  return ((y - MIN_YEAR) / RANGE) * 100;
}

function getColor(closed, tags) {
  if (tags.includes('fire')) return '#ef4444';
  if (closed >= 2025) return '#dc2626';
  if (closed >= 2022) return '#ea580c';
  if (closed >= 2020) return '#f97316';
  return '#f59e0b';
}

function getBorderColor(tags) {
  if (tags.includes('fire')) return '#fbbf24';
  return '#ef4444';
}

function getFiltered() {
  let data = R.slice();
  if (currentFilter === 'fire') {
    data = data.filter(r => r[4].includes('fire'));
  } else if (currentFilter === 'institution') {
    data = data.filter(r => r[4].includes('institution'));
  } else if (/^\d{4}$/.test(currentFilter)) {
    const yr = parseInt(currentFilter);
    data = data.filter(r => r[2] === yr);
  }
  if (currentSort === 'opened') {
    data.sort((a, b) => a[1] - b[1]);
  } else if (currentSort === 'lifespan') {
    data.sort((a, b) => (b[2] - b[1]) - (a[2] - a[1]));
  } else if (currentSort === 'closed') {
    data.sort((a, b) => a[2] - b[2] || a[1] - b[1]);
  } else {
    data.sort((a, b) => a[0].localeCompare(b[0]));
  }
  return data;
}

function render() {
  const data = getFiltered();
  document.getElementById('count-label').textContent = data.length + ' restaurants';
  const chart = document.getElementById('chart');
  let html = '';

  // Year axis
  html += '<div class="year-axis"><div class="row-label"></div><div class="row-track">';
  for (let y = 1930; y <= 2020; y += 10) {
    const pct = yearToPercent(y);
    html += '<div class="year-tick" style="left:' + pct + '%">' + y + '</div>';
    html += '<div class="year-line" style="left:' + pct + '%;height:' + (data.length * 24 + 40) + 'px"></div>';
  }
  html += '</div></div>';

  data.forEach((r, i) => {
    const name = r[0], opened = r[1], closed = r[2], note = r[3], tags = r[4];
    const announced = r[5] || null;
    const lifespan = closed - opened;
    const barLeft = yearToPercent(opened);
    const barWidth = yearToPercent(closed) - barLeft;
    const color = getColor(closed, tags);
    const borderColor = getBorderColor(tags);

    html += '<div class="timeline-row">';
    html += '<div class="row-label" title="' + name + '">' + name + '</div>';
    html += '<div class="row-track">';
    // Announcement line
    if (announced && announced < opened) {
      const annPct = yearToPercent(announced);
      html += '<div class="announce-line" style="left:' + annPct + '%"></div>';
    }
    html += '<div class="bar" style="left:' + barLeft + '%;width:' + Math.max(barWidth, 0.35) + '%;background:#94a3b8;border-right-color:#94a3b8" data-idx="' + i + '">';
    if (barWidth > 5) html += '<span class="bar-label">' + lifespan + 'y</span>';
    html += '</div></div></div>';
  });

  chart.innerHTML = html;

  chart.querySelectorAll('.bar[data-idx]').forEach(bar => {
    bar.addEventListener('mouseenter', e => {
      const d = data[parseInt(bar.dataset.idx)];
      const lifespan = d[2] - d[1];
      document.getElementById('tt-name').textContent = d[0];
      const annStr = d[5] ? 'Announced ' + d[5] + ' \u00b7 ' : '';
      document.getElementById('tt-years').textContent = annStr + 'Opened ' + d[1] + ' \u00b7 Closed ' + d[2];
      document.getElementById('tt-note').textContent = d[3];
      const extra = d[4].includes('fire') ? ' \u00b7 \ud83d\udd25 Wildfire' : '';
      document.getElementById('tt-lifespan').textContent = lifespan + ' year' + (lifespan !== 1 ? 's' : '') + extra;
      const tt = document.getElementById('tooltip');
      tt.style.display = 'block';
      tt.style.left = Math.min(e.clientX + 12, window.innerWidth - 320) + 'px';
      tt.style.top = (e.clientY - 60) + 'px';
    });
    bar.addEventListener('mousemove', e => {
      const tt = document.getElementById('tooltip');
      tt.style.left = Math.min(e.clientX + 12, window.innerWidth - 320) + 'px';
      tt.style.top = (e.clientY - 60) + 'px';
    });
    bar.addEventListener('mouseleave', () => {
      document.getElementById('tooltip').style.display = 'none';
    });
  });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.controls .filter-btn[data-filter]').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  render();
}

function setSort(s) {
  currentSort = s;
  document.getElementById('sort-open').classList.toggle('active', s === 'opened');
  document.getElementById('sort-life').classList.toggle('active', s === 'lifespan');
  document.getElementById('sort-close').classList.toggle('active', s === 'closed');
  document.getElementById('sort-alpha').classList.toggle('active', s === 'alpha');
  render();
}

render();
</script>
</body>
</html>
