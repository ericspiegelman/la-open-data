<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAFD EMS Response Time by Quarter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 32px; }
  .container { max-width: 1200px; margin: 0 auto; }
  .header { margin-bottom: 28px; }
  h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; color: #f8fafc; letter-spacing: -0.02em; }
  .subtitle { color: #94a3b8; font-size: 0.85rem; line-height: 1.5; }
  .subtitle a { color: #94a3b8; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat { background: linear-gradient(135deg, #1e293b 0%, #1a2332 100%); border-radius: 10px; padding: 16px 18px; border: 1px solid rgba(251,191,36,0.08); }
  .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
  .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 6px; }
  .stat-sub { font-size: 0.7rem; color: #64748b; margin-top: 2px; }
  .amber { color: #fbbf24; }
  .down { color: #f87171; }
  .chart-wrap { background: linear-gradient(135deg, #1e293b 0%, #1a2332 100%); border-radius: 12px; padding: 24px; border: 1px solid rgba(251,191,36,0.06); }
  canvas { width: 100% !important; }
  .footer { margin-top: 16px; text-align: right; color: #475569; font-size: 0.75rem; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>LAFD Average EMS Response Time</h1>
    <p class="subtitle">Quarterly average, Q1 2013 &ndash; Q1 2026 &bull; Source: City of LA Open Data Portal <a href="https://data.lacity.org/dataset/LAFD-Citywide-Response-Metrics-Updated/kcsj-s69p" style="color:#94a3b8" target="_blank">data.lacity.org/resource/kcsj-s69p</a></p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">2013 Average</div>
      <div class="stat-value amber">6:35</div>
      <div class="stat-sub">minutes</div>
    </div>
    <div class="stat">
      <div class="stat-label">Most Recent (2025 Q4)</div>
      <div class="stat-value amber">7:30</div>
      <div class="stat-sub down">+55s from 2013</div>
    </div>
    <div class="stat">
      <div class="stat-label">Slowest Quarter</div>
      <div class="stat-value amber">7:31</div>
      <div class="stat-sub">2025 Q1</div>
    </div>
  </div>
  <div class="chart-wrap">
    <canvas id="chart" height="640"></canvas>
  </div>
  <div class="footer">Generated March 2026 &bull; data.lacity.org</div>
</div>
<script>
const labels = ["2013 Q1", "2013 Q2", "2013 Q3", "2013 Q4", "2014 Q1", "2014 Q2", "2014 Q3", "2014 Q4", "2015 Q1", "2015 Q2", "2015 Q3", "2015 Q4", "2016 Q1", "2016 Q2", "2016 Q3", "2016 Q4", "2017 Q1", "2017 Q2", "2017 Q3", "2017 Q4", "2018 Q1", "2018 Q2", "2018 Q3", "2018 Q4", "2019 Q1", "2019 Q2", "2019 Q3", "2019 Q4", "2020 Q1", "2020 Q2", "2020 Q3", "2020 Q4", "2021 Q1", "2021 Q2", "2021 Q3", "2021 Q4", "2022 Q1", "2022 Q2", "2022 Q3", "2022 Q4", "2023 Q1", "2023 Q2", "2023 Q3", "2023 Q4", "2024 Q1", "2024 Q2", "2024 Q3", "2024 Q4", "2025 Q1", "2025 Q2", "2025 Q3", "2025 Q4", "2026 Q1"];
const values = [395, 392, 391, 395, 399, 394, 390, 389, 385, 386, 388, 383, 378, 376, 383, 387, 387, 386, 387, 388, 389, 386, 390, 388, 387, 391, 389, 392, 391, 390, 396, 399, 397, 400, 405, 414, 421, 423, 429, 430, 431, 427, 433, 437, 441, 440, 448, 443, 451, 449, 449, 450, 450];

const gradient = document.getElementById('chart').getContext('2d');
const fill = gradient.createLinearGradient(0, 0, 0, 640);
fill.addColorStop(0, 'rgba(251, 191, 36, 0.25)');
fill.addColorStop(0.5, 'rgba(251, 191, 36, 0.08)');
fill.addColorStop(1, 'rgba(251, 191, 36, 0)');

function fmtTime(s) {
  return Math.floor(s/60) + ':' + String(Math.round(s%60)).padStart(2,'0');
}

new Chart(gradient, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'Avg EMS Response Time',
      data: values,
      borderColor: '#fbbf24',
      backgroundColor: fill,
      fill: true,
      tension: 0.35,
      pointRadius: 3,
      pointHoverRadius: 7,
      pointBackgroundColor: '#fbbf24',
      pointBorderColor: '#0f172a',
      pointBorderWidth: 2,
      pointHoverBorderColor: '#fff',
      pointHoverBorderWidth: 2,
      borderWidth: 3
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: {
      intersect: false,
      mode: 'index'
    },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(15, 23, 42, 0.95)',
        titleColor: '#fbbf24',
        bodyColor: '#e2e8f0',
        borderColor: 'rgba(251, 191, 36, 0.3)',
        borderWidth: 1,
        padding: 12,
        cornerRadius: 8,
        titleFont: { size: 14, weight: 'bold' },
        bodyFont: { size: 13 },
        displayColors: false,
        callbacks: {
          title: ctx => ctx[0].label,
          label: ctx => {
            const val = fmtTime(ctx.parsed.y);
            const idx = ctx.dataIndex;
            if (idx > 0) {
              const prev = values[idx - 1];
              const chg = ctx.parsed.y - prev;
              return val + '  (' + (chg >= 0 ? '+' : '') + chg + 's QoQ)';
            }
            return val;
          }
        }
      },
      annotation: {
        annotations: {
          covid: {
            type: 'line',
            xMin: '2020 Q1',
            xMax: '2020 Q1',
            borderColor: 'rgba(248, 113, 113, 0.4)',
            borderWidth: 1,
            borderDash: [4, 4],
            label: {
              display: true,
              content: 'COVID-19',
              position: 'start',
              backgroundColor: 'rgba(248, 113, 113, 0.15)',
              color: '#f87171',
              font: { size: 10 },
              padding: 4,
              borderRadius: 4
            }
          },
          bass: {
            type: 'line',
            xMin: '2022 Q4',
            xMax: '2022 Q4',
            borderColor: 'rgba(96, 165, 250, 0.4)',
            borderWidth: 1,
            borderDash: [4, 4]
          }
        }
      }
    },
    scales: {
      x: {
        ticks: {
          color: '#64748b',
          font: { size: 11 },
          maxRotation: 45,
          callback: function(val, idx) {
            const lbl = labels[idx];
            return lbl.endsWith('Q1') ? lbl.replace(' Q1', '') : '';
          }
        },
        grid: { color: 'rgba(100,116,139,0.1)' }
      },
      y: {
        ticks: {
          color: '#64748b',
          font: { size: 11 },
          callback: v => fmtTime(v)
        },
        grid: { color: 'rgba(100,116,139,0.1)' }
      }
    }
  }
});
</script>
</body>
</html>
