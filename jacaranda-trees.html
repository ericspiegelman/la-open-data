// === TREE DOT LAYER ===
const treeRenderer = L.canvas({ padding: 0.5 });
const treeLayer = L.layerGroup();
const treeMarkers = [];

T.forEach(p => {
  const treeTxt = p[4] > 1 ? p[4] + ' trees' : '1 tree';
  const cdTxt = p[3] ? ' &bull; CD ' + p[3] : '';
  const m = L.circleMarker([p[0], p[1]], {

  m.bindPopup(`

// === DENSITY LAYER ===
const densityLayer = L.layerGroup();

function densityColor(d) {
  if (d >= 20) return '#8b5cf6';
  if (d >= 15) return '#c4b5fd';
  return '#ddd6fe';
}

function densityWeight(d) {
  if (d >= 20) return 6;
  if (d >= 15) return 5;
  return 3.5;
}

function densityOpacity(d) {
  if (d >= 20) return 0.9;
  if (d >= 15) return 0.85;
  return 0.75;
}

D.forEach(s => {
  const latlngs = s.c.map(c => [c[0], c[1]]);
  const col = densityColor(s.d);
  const popupHtml = `
    <div style="font-size:0.85rem">
      <div style="color:${col};font-weight:700">${s.s}</div>
      <div style="color:#e2e8f0;margin-top:4px">${s.r}</div>
      <div style="color:#94a3b8;font-size:0.78rem;margin-top:3px">${s.t} trees &bull; ${s.b} blocks &bull; ${s.d} trees/block</div>
      <div style="color:#64748b;font-size:0.72rem;margin-top:3px">${s.f.toLocaleString()} ft</div>
    </div>
  `;

  if (latlngs.length < 2) {
    const m = L.circleMarker(latlngs[0], {
      radius: densityWeight(s.d) + 2,
      fillColor: col,
      fillOpacity: densityOpacity(s.d),
      color: col,
      weight: 2,
      opacity: 0.9
    });
    m.bindPopup(popupHtml, { maxWidth: 240 });
    densityLayer.addLayer(m);
    return;
  }
  const line = L.polyline(latlngs, {
    color: col,
    weight: densityWeight(s.d),
    opacity: densityOpacity(s.d),
    lineCap: 'round',
    lineJoin: 'round'
  });
  line.bindPopup(popupHtml, { maxWidth: 260 });
  densityLayer.addLayer(line);
});

// === TOGGLE LOGIC ===
let currentView = 'trees';

function showTrees() {
  if (currentView === 'trees') return;
  currentView = 'trees';
  map.removeLayer(densityLayer);
  treeLayer.addTo(map);
  document.getElementById('btn-trees').classList.add('active');
  document.getElementById('btn-density').classList.remove('active');
  document.getElementById('legend').classList.remove('visible');
  document.getElementById('subtitle').innerHTML = "20,460 street trees at 12,917 locations &bull; Geocoded to street address &bull; Source: <a href=\"https://data.lacity.org\" target=\"_blank\">data.lacity.org</a> Street Tree Inventory";
}

function showDensity() {
  if (currentView === 'density') return;
  currentView = 'density';
  map.removeLayer(treeLayer);
  densityLayer.addTo(map);
  document.getElementById('btn-density').classList.add('active');
  document.getElementById('btn-trees').classList.remove('active');
  document.getElementById('legend').classList.add('visible');
  document.getElementById('subtitle').innerHTML = "281 street stretches with &ge;10 jacarandas per block &bull; Source: <a href=\"https://data.lacity.org\" target=\"_blank\">data.lacity.org</a> Street Tree Inventory";
}

// Zoom-responsive dot sizing
map.on('zoomend', () => {
  if (currentView !== 'trees') return;
  const z = map.getZoom();
  let r, fo;
  if (z <= 10) { r = 1.5; fo = 0.5; }
  else if (z <= 12) { r = 2.5; fo = 0.6; }
  else if (z <= 14) { r = 4; fo = 0.7; }
  else if (z <= 16) { r = 6; fo = 0.75; }
  else { r = 8; fo = 0.85; }
  treeMarkers.forEach(m => m.setRadius(r).setStyle({ fillOpacity: fo }));
});
</script>
</body>
