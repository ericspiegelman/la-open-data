const map = L.map('map', { center:[34.05,-118.35], zoom:11, zoomControl:true });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OSM &copy; CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

// Use a canvas renderer for performance with 13K points
const renderer = L.canvas({ padding: 0.5 });

// Add all trees as tiny lavender circles
const markers = [];
T.forEach(p => {
  const m = L.circleMarker([p[0], p[1]], {
    radius: 3,
    fillColor: '#c4b5fd',
    fillOpacity: 0.7,
    color: '#a78bfa',
    weight: 0.5,
    opacity: 0.8,
    renderer: renderer
  }).addTo(map);
  markers.push(m);
});

// Adjust dot size on zoom
map.on('zoomend', () => {
  const z = map.getZoom();
  let r, fo;
  if (z <= 10) { r = 1.5; fo = 0.5; }
  else if (z <= 12) { r = 2.5; fo = 0.6; }
  else if (z <= 14) { r = 4; fo = 0.7; }
  else if (z <= 16) { r = 6; fo = 0.75; }
  else { r = 8; fo = 0.85; }
  markers.forEach(m => m.setRadius(r).setStyle({ fillOpacity: fo }));
});

// Info panel
const infoDiv = document.createElement('div');
infoDiv.className = 'info-panel';
infoDiv.innerHTML = `

`;
document.getElementById('map').appendChild(infoDiv);
