<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA Business Closures 1996–2024</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 32px; }
  .container { max-width: 1200px; margin: 0 auto; }
  .header { margin-bottom: 28px; }
  h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; color: #f8fafc; letter-spacing: -0.02em; }
  .subtitle { color: #94a3b8; font-size: 0.85rem; line-height: 1.5; }
  .subtitle a { color: #94a3b8; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat { background: linear-gradient(135deg, #1e293b 0%, #1a2332 100%); border-radius: 10px; padding: 16px 18px; border: 1px solid rgba(251,191,36,0.08); }
  .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500; }
  .stat-value { font-size: 1.5rem; font-weight: 700; margin-top: 6px; }
  .stat-sub { font-size: 0.7rem; color: #64748b; margin-top: 2px; }
  .amber { color: #fbbf24; }
  .down { color: #f87171; }
  .chart-wrap { background: linear-gradient(135deg, #1e293b 0%, #1a2332 100%); border-radius: 12px; padding: 24px; border: 1px solid rgba(251,191,36,0.06); }
  canvas { width: 100% !important; }
  .footer { margin-top: 16px; text-align: right; color: #475569; font-size: 0.75rem; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Business Closures in Los Angeles</h1>
    <p class="subtitle">Annual totals, 1996&ndash;2024 &bull; 1,015,158 total closures &bull; Source: City of LA Open Data Portal <a href="https://data.lacity.org/Administration-Finance/Listing-of-All-Businesses/r4uk-afju" style="color:#94a3b8" target="_blank">data.lacity.org/resource/r4uk-afju</a></p>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Peak Year</div>
      <div class="stat-value amber">53,851</div>
      <div class="stat-sub">2007</div>
    </div>
    <div class="stat">
      <div class="stat-label">Most Recent (2024)</div>
      <div class="stat-value amber">30,278</div>
      <div class="stat-sub"></div>
    </div>
    <div class="stat">
      <div class="stat-label">Lowest Year</div>
      <div class="stat-value amber">21,117</div>
      <div class="stat-sub">2023</div>
    </div>
  </div>
  <div class="chart-wrap">
    <canvas id="chart" height="640"></canvas>
  </div>
  <div class="footer">Generated March 2026 &bull; data.lacity.org</div>
</div>
<script>
const labels = ["1996", "1997", "1998", "1999", "2000", "2001", "2002", "2003", "2004", "2005", "2006", "2007", "2008", "2009", "2010", "2011", "2012", "2013", "2014", "2015", "2016", "2017", "2018", "2019", "2020", "2021", "2022", "2023", "2024"];
const values = [22357, 27936, 26160, 25936, 25066, 27551, 32190, 32991, 51780, 30927, 39456, 53851, 42719, 41350, 48634, 37777, 41559, 47454, 36270, 41364, 36269, 35670, 37546, 37829, 35806, 24450, 22865, 21117, 30278];

const gradient = document.getElementById('chart').getContext('2d');
const fill = gradient.createLinearGradient(0, 0, 0, 640);
fill.addColorStop(0, 'rgba(251, 191, 36, 0.25)');
fill.addColorStop(0.5, 'rgba(251, 191, 36, 0.08)');
fill.addColorStop(1, 'rgba(251, 191, 36, 0)');

new Chart(gradient, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'Annual Closures',
      data: values,
      borderColor: '#fbbf24',
      backgroundColor: fill,
      fill: true,
      tension: 0.35,
      pointRadius: 3,
      pointHoverRadius: 7,
      pointBackgroundColor: '#fbbf24',
      pointBorderColor: '#0f172a',
      pointBorderWidth: 2,
      pointHoverBorderColor: '#fff',
      pointHoverBorderWidth: 2,
      borderWidth: 3
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: {
      intersect: false,
      mode: 'index'
    },
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: 'rgba(15, 23, 42, 0.95)',
        titleColor: '#fbbf24',
        bodyColor: '#e2e8f0',
        borderColor: 'rgba(251, 191, 36, 0.3)',
        borderWidth: 1,
        padding: 12,
        cornerRadius: 8,
        titleFont: { size: 14, weight: 'bold' },
        bodyFont: { size: 13 },
        displayColors: false,
        callbacks: {
          title: ctx => ctx[0].label,
          label: ctx => {
            const val = ctx.parsed.y.toLocaleString() + ' closures';
            const idx = ctx.dataIndex;
            if (idx > 0) {
              const prev = values[idx - 1];
              const chg = ((ctx.parsed.y / prev) - 1) * 100;
              return val + '  (' + (chg >= 0 ? '+' : '') + chg.toFixed(1) + '% YoY)';
            }
            return val;
          }
        }
      },
      annotation: {
        annotations: {
          dotcom: {
            type: 'line',
            xMin: '2001',
            xMax: '2001',
            borderColor: 'rgba(248, 113, 113, 0.4)',
            borderWidth: 1,
            borderDash: [4, 4],
            label: {
              display: true,
              content: 'Dot-com bust',
              position: 'start',
              backgroundColor: 'rgba(248, 113, 113, 0.15)',
              color: '#f87171',
              font: { size: 10 },
              padding: 4,
              borderRadius: 4
            }
          },
          recession: {
            type: 'line',
            xMin: '2008',
            xMax: '2008',
            borderColor: 'rgba(248, 113, 113, 0.4)',
            borderWidth: 1,
            borderDash: [4, 4],
            label: {
              display: true,
              content: 'Great Recession',
              position: 'start',
              backgroundColor: 'rgba(248, 113, 113, 0.15)',
              color: '#f87171',
              font: { size: 10 },
              padding: 4,
              borderRadius: 4
            }
          },
          covid: {
            type: 'line',
            xMin: '2020',
            xMax: '2020',
            borderColor: 'rgba(248, 113, 113, 0.4)',
            borderWidth: 1,
            borderDash: [4, 4],
            label: {
              display: true,
              content: 'COVID-19',
              position: 'start',
              backgroundColor: 'rgba(248, 113, 113, 0.15)',
              color: '#f87171',
              font: { size: 10 },
              padding: 4,
              borderRadius: 4
            }
          },
          bass: {
            type: 'line',
            xMin: '2022',
            xMax: '2022',
            borderColor: 'rgba(96, 165, 250, 0.4)',
            borderWidth: 1,
            borderDash: [4, 4],
            label: {
              display: true,
              content: ['Karen Bass', 'becomes Mayor'],
              position: '15%',
              backgroundColor: 'rgba(96, 165, 250, 0.15)',
              color: '#60a5fa',
              font: { size: 10 },
              padding: 4,
              borderRadius: 4
            }
          }
        }
      }
    },
    scales: {
      x: {
        ticks: {
          color: '#64748b',
          font: { size: 11 },
          callback: function(val, idx) {
            const yr = parseInt(labels[idx]);
            return yr % 5 === 0 ? labels[idx] : '';
          }
        },
        grid: { color: 'rgba(100,116,139,0.1)' }
      },
      y: {
        beginAtZero: true,
        ticks: {
          color: '#64748b',
          font: { size: 11 },
          callback: v => (v/1000).toFixed(0) + 'K'
        },
        grid: { color: 'rgba(100,116,139,0.1)' }
      }
    }
  }
});
</script>
</body>
</html>
